<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snapshort</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      background: linear-gradient(145deg, #0d001a 0%, #000d1f 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    header {
      padding: 13px 16px 11px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
    .logo span { color: #60a5fa; }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.25);
      color: #818cf8;
      letter-spacing: 0.03em;
    }

    /* ── Body ── */
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 11px; }

    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 5px;
    }

    label .opt { color: #374151; font-weight: 400; text-transform: none; letter-spacing: 0; }

    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 9px 11px;
      color: #fff;
      font-size: 12.5px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: rgba(99,102,241,0.55); background: rgba(255,255,255,0.09); }
    input[type="text"]::placeholder { color: #4b5563; }

    /* ── Shorten button ── */
    #btn-shorten {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      color: #fff;
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    #btn-shorten:hover { opacity: 0.88; }
    #btn-shorten:active { transform: scale(0.98); }
    #btn-shorten:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Error ── */
    #error {
      background: rgba(239,68,68,0.09);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 9px 11px;
      color: #f87171;
      font-size: 12px;
      line-height: 1.4;
    }

    /* ── Result card ── */
    #result {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      animation: fadein 0.2s ease;
    }

    @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .result-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #short-url-text {
      flex: 1;
      font-size: 12.5px;
      color: #60a5fa;
      word-break: break-all;
      font-weight: 500;
      line-height: 1.4;
    }

    #btn-copy {
      flex-shrink: 0;
      padding: 6px 11px;
      border-radius: 6px;
      border: 1px solid rgba(34,197,94,0.25);
      background: rgba(34,197,94,0.1);
      color: #4ade80;
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #btn-copy:hover { background: rgba(34,197,94,0.2); }
    #btn-copy.copied { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.2); }

    .qr-wrap { display: flex; justify-content: center; }
    #qr {
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.08);
      display: block;
    }

    /* ── Footer / login hint ── */
    .footer-hint {
      padding: 10px 16px 13px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .footer-hint p { font-size: 11px; color: #4b5563; line-height: 1.35; }

    #btn-dashboard {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #9ca3af;
      font-size: 11px;
      padding: 5px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    #btn-dashboard:hover { border-color: rgba(99,102,241,0.4); color: #fff; background: rgba(99,102,241,0.1); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Snap<span>short</span></div>
    <div class="badge">Extension</div>
  </header>

  <div class="body">

    <div>
      <label>URL to shorten</label>
      <input id="url" type="text" placeholder="https://example.com/very-long-url" />
    </div>

    <div>
      <label>Custom alias <span class="opt">(optional)</span></label>
      <input id="alias" type="text" placeholder="my-link" />
    </div>

    <button id="btn-shorten">Shorten →</button>

    <div id="error" class="hidden"></div>

    <div id="result" class="hidden">
      <div class="result-row">
        <span id="short-url-text"></span>
        <button id="btn-copy">Copy</button>
      </div>
      <div class="qr-wrap">
        <img id="qr" width="128" height="128" alt="QR Code" />
      </div>
    </div>

  </div>

  <div class="footer-hint">
    <p>Dashboard, folders &amp; analytics</p>
    <button id="btn-dashboard">Open Dashboard →</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
